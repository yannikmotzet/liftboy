<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Liftboy{% endblock %}</title>
  <link rel="icon" type="image/png" href="/static/liftboy_logo.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }
    header {
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #7c85ff;
      letter-spacing: 0.05em;
    }
    header .subtitle {
      color: #64748b;
      font-size: 0.85rem;
    }
    main { padding: 2rem; }

    .filters {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .filters select, .filters input {
      background: #1a1d27;
      border: 1px solid #2d3148;
      color: #e2e8f0;
      padding: 0.3rem 0.5rem;
      border-radius: 5px;
      font-size: 0.8rem;
      min-width: 130px;
    }
    .filters button {
      background: #7c85ff;
      color: #fff;
      border: none;
      padding: 0.3rem 0.9rem;
      border-radius: 5px;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .filters button:hover { background: #6366f1; }
    .filters a.reset {
      color: #64748b;
      font-size: 0.75rem;
      text-decoration: none;
    }
    .filters a.reset:hover { color: #94a3b8; }

    /* column visibility toggle */
    .col-picker { position: relative; }
    .col-picker summary {
      list-style: none;
      background: #1a1d27;
      border: 1px solid #2d3148;
      color: #94a3b8;
      padding: 0.3rem 0.75rem;
      border-radius: 5px;
      font-size: 0.8rem;
      cursor: pointer;
      user-select: none;
    }
    .col-picker summary:hover { color: #e2e8f0; border-color: #4b5563; }
    .col-picker summary::-webkit-details-marker { display: none; }
    .col-picker-menu {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 6px;
      padding: 0.5rem 0;
      z-index: 100;
      min-width: 150px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }
    .col-picker-menu label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.35rem 0.85rem;
      font-size: 0.8rem;
      color: #cbd5e1;
      cursor: pointer;
      white-space: nowrap;
    }
    .col-picker-menu label:hover { background: #252840; }

    /* per-column hiding via class on <table> */
    #recordings-table.hide-name       [data-col=name]       { display: none; }
    #recordings-table.hide-start-time [data-col=start-time] { display: none; }
    #recordings-table.hide-duration   [data-col=duration]   { display: none; }
    #recordings-table.hide-size       [data-col=size]       { display: none; }
    #recordings-table.hide-robot      [data-col=robot]      { display: none; }
    #recordings-table.hide-client     [data-col=client]     { display: none; }
    #recordings-table.hide-status     [data-col=status]     { display: none; }
    #recordings-table.hide-progress   [data-col=progress]   { display: none; }
    #recordings-table.hide-transfer   [data-col=transfer]   { display: none; }
    #recordings-table.hide-eta        [data-col=eta]        { display: none; }
    #recordings-table.hide-registered   [data-col=registered]   { display: none; }
    #recordings-table.hide-topics      [data-col=topics]       { display: none; }
    #recordings-table.hide-messages    [data-col=messages]     { display: none; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }
    thead th {
      background: #1a1d27;
      color: #64748b;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      padding: 0.75rem 1rem;
      text-align: left;
      border-bottom: 1px solid #2d3148;
    }
    tbody tr {
      border-bottom: 1px solid #1e2235;
      transition: background 0.15s;
    }
    tbody tr:hover { background: #161926; }
    td { padding: 0.75rem 1rem; vertical-align: middle; }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge-pending      { background: #374151; color: #9ca3af; }
    .badge-uploading    { background: #1e3a5f; color: #60a5fa; }
    .badge-completed    { background: #14532d; color: #4ade80; }
    .badge-failed       { background: #450a0a; color: #f87171; }
    .badge-interrupted  { background: #431407; color: #fb923c; }

    progress {
      width: 100px;
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
      appearance: none;
      -webkit-appearance: none;
      background: #2d3148;
      vertical-align: middle;
    }
    progress::-webkit-progress-bar   { background: #2d3148; border-radius: 4px; }
    progress::-webkit-progress-value { background: #7c85ff; border-radius: 4px; }
    progress::-moz-progress-bar      { background: #7c85ff; border-radius: 4px; }
    .progress-label { margin-left: 0.5rem; color: #94a3b8; font-size: 0.8rem; }

    .name-cell { font-family: monospace; font-size: 0.82rem; color: #c4c9e8; }
    .robot-cell { color: #94a3b8; }
    .mono { font-family: monospace; }
    .dim { color: #4b5563; }

    /* Prevent cell text from wrapping — keeps column widths stable */
    td { white-space: nowrap; overflow: hidden; }
    td[data-col="name"] { max-width: 300px; text-overflow: ellipsis; }

    /* Fixed minimum widths for dynamic columns — prevents layout jumping */
    th[data-col="start-time"], td[data-col="start-time"] { min-width: 148px; font-size: 0.78rem; }
    th[data-col="duration"],   td[data-col="duration"]   { min-width: 80px; }
    th[data-col="size"],       td[data-col="size"]        { min-width: 72px; }
    th[data-col="status"],     td[data-col="status"]      { min-width: 98px; }
    th[data-col="progress"],   td[data-col="progress"]    { min-width: 140px; }
    th[data-col="transfer"],   td[data-col="transfer"]    { min-width: 158px; }
    th[data-col="eta"],        td[data-col="eta"]         { min-width: 76px; }
    th[data-col="topics"],     td[data-col="topics"]      { min-width: 58px; text-align: right; }
    th[data-col="messages"],   td[data-col="messages"]    { min-width: 72px; text-align: right; }

    /* Column-specific styles (avoids inline style on every cell) */
    td[data-col="client"]     { font-size: 0.8rem; color: #94a3b8; }
    td[data-col="registered"] { font-size: 0.78rem; color: #64748b; }

    .empty-state {
      text-align: center;
      padding: 4rem;
      color: #4b5563;
    }
    .empty-state p { font-size: 1rem; }

    .stats-bar {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .stat {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 0.75rem 1.25rem;
      min-width: 120px;
    }
    .stat .label { font-size: 0.72rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat .value { font-size: 1.4rem; font-weight: 700; margin-top: 0.2rem; }
    .stat .value.blue    { color: #60a5fa; }
    .stat .value.green   { color: #4ade80; }
    .stat .value.red     { color: #f87171; }
    .stat .value.orange  { color: #fb923c; }
    .stat .value.default { color: #e2e8f0; }
  </style>
</head>
<body>
  <header>
    <img src="/static/liftboy_logo.png" alt="Liftboy" style="height:2.5rem;width:auto;">
    <div>
      <h1>Liftboy</h1>
      <span class="subtitle">Recording upload manager</span>
    </div>
    <div id="conn-status" style="margin-left:auto;display:flex;align-items:center;gap:0.4rem;font-size:0.8rem;color:#4ade80;">
      <span id="conn-dot" style="font-size:0.6rem;">●</span>
      <span id="conn-label">connected</span>
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
